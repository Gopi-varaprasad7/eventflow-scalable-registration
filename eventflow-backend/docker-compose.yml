version: "3.8"

services:
  app:
    build: .
    container_name: eventflow_app
    ports:
      - "5001:5001"
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eventflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: npm run dev

  postgres:
    image: postgres:15
    container_name: eventflow_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: eventflow_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: